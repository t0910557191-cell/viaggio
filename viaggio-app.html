// ── HELPERS ──
function zipPhotos(photos, prefix) {
  // Download photos one by one as individual files
  photos.forEach((ph, i) => {
    const a = document.createElement('a');
    a.href = ph;
    const ext = ph.startsWith('data:image/png') ? 'png' : 'jpg';
    a.download = prefix + '_' + String(i+1).padStart(3,'0') + '.' + ext;
    a.click();
  });
}

function jsonBackup(data, fn) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fn; a.click();
}

function csvDl(rows, fn) {
  if (!rows.length) return;
  const h = Object.keys(rows[0]);
  const body = rows.map(r => h.map(k => '"' + String(r[k]||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + h.join(',') + '\n' + body], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fn; a.click();
}
function readImg(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res({url: canvas.toDataURL('image/jpeg', 0.7), name: file.name});
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function DateInput({style, value, onChange, required}) {
  const now = new Date();
  const curY = value ? parseInt(value.slice(0,4)) : now.getFullYear();
  const curM = value ? parseInt(value.slice(5,7)) : now.getMonth()+1;
  const curD = value ? parseInt(value.slice(8,10)) : now.getDate();
  const years = Array.from({length:10}, (_,i) => now.getFullYear()-2+i);
  const months = Array.from({length:12}, (_,i) => i+1);
  const daysInMonth = new Date(curY, curM, 0).getDate();
  const days = Array.from({length:daysInMonth}, (_,i) => i+1);
  const pad = n => String(n).padStart(2,'0');
  const emit = (y,m,d) => onChange({target:{value: y+'-'+pad(m)+'-'+pad(d)}});
  const borderColor = required && !value ? 'rgba(212,168,83,.4)' : undefined;
  return (
    <div style={{display:'grid', gridTemplateColumns:'2fr 1.5fr 1.5fr', gap:5}}>
      <select style={{...style, borderColor, appearance:'none', fontSize:13, padding:'8px 10px'}}
        value={curY} onChange={e=>emit(parseInt(e.target.value),curM,Math.min(curD,new Date(parseInt(e.target.value),curM,0).getDate()))}>
        {years.map(y=><option key={y} value={y}>{y}</option>)}
      </select>
      <select style={{...style, borderColor, appearance:'none', fontSize:13, padding:'8px 10px'}}
        value={curM} onChange={e=>emit(curY,parseInt(e.target.value),Math.min(curD,new Date(curY,parseInt(e.target.value),0).getDate()))}>
        {months.map(m=><option key={m} value={m}>{pad(m)}</option>)}
      </select>
      <select style={{...style, borderColor, appearance:'none', fontSize:13, padding:'8px 10px'}}
        value={curD} onChange={e=>emit(curY,curM,parseInt(e.target.value))}>
        {days.map(d=><option key={d} value={d}>{pad(d)}</option>)}
      </select>
    </div>
  );
}

// ── BAR CHART ──
function Bar({labels, vals, clr, unit, noData}) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current || !labels.length) return;
    const ex = Chart.getChart(ref.current); if (ex) ex.destroy();
    new Chart(ref.current, {
      type:'bar',
      data:{labels, datasets:[{data:vals, backgroundColor:clr+'99', borderColor:clr, borderWidth:1, borderRadius:3}]},
      options:{responsive:true, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c => (unit||'') + c.parsed.y.toFixed(0)}}}, scales:{x:{ticks:{color:G.dim, font:{size:10}}, grid:{color:G.br2}}, y:{ticks:{color:G.dim, font:{size:10}, callback:v=>(unit||'')+v}, grid:{color:G.br2}, beginAtZero:true}}}
    });
  }, [labels.join(','), vals.join(',')]);
  if (!labels.length) return <div style={{textAlign:'center', padding:'20px 0', color:'#3a3020', fontSize:12, fontStyle:'italic'}}>{noData||'—'}</div>;
  return <canvas ref={ref} style={{maxHeight:200}}/>;
}

// FX PANEL — any-pair rate editing
// ══════════════════════════════════════════════
function FXPanel({T}) {
  // Store rates as a matrix: rates[A][B] = how many B per 1 A
  // We derive this from BASE_FX: rate(A->B) = BASE_FX[A] / BASE_FX[B]
  // User can override any pair directly
  const [overrides, setOverrides] = useState({});
  const [baseCurr, setBaseCurr] = useState('USD $');  // { 'CNY ¥->EUR €': 0.128, ... }
  const [fc, setFc] = useState('CNY ¥');
  const [tc, setTc] = useState('EUR €');
  const [amt, setAmt] = useState('100');
  // pair edit state
  const [pA, setPA] = useState('EUR €');
  const [pB, setPB] = useState('CNY ¥');
  const [pVal, setPVal] = useState('');
  const sym = c => c.split(' ')[1] || '';

  const getRate = (from, to) => {
    if (from === to) return 1;
    const key = from + '->' + to;
    const rkey = to + '->' + from;
    if (overrides[key] !== undefined) return overrides[key];
    if (overrides[rkey] !== undefined) return 1 / overrides[rkey];
    return BASE_FX[from] / BASE_FX[to];
  };

  const setPair = () => {
    const n = parseFloat(pVal);
    if (isNaN(n) || n <= 0) return;
    const key = pA + '->' + pB;
    setOverrides(o => ({...o, [key]: n}));
    setPVal('');
  };

  const resetAll = () => setOverrides({});

  const result = (parseFloat(amt)||0) * getRate(fc, tc);



  return (
    <div>
      {/* Quick converter */}
      <div style={{...S.card, marginBottom:14}}>
        <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.dim, marginBottom:12}}>{T.calcTitle}</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:8, alignItems:'center', marginBottom:12}}>
          <div>
            <Lbl t={T.fxFrom}/>
            <select style={{...S.inp, appearance:'none', fontSize:13}} value={fc} onChange={e=>setFc(e.target.value)}>
              {CURR.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{color:G.gold, fontSize:18, marginTop:16, textAlign:'center'}}>⇄</div>
          <div>
            <Lbl t={T.fxTo}/>
            <select style={{...S.inp, appearance:'none', fontSize:13}} value={tc} onChange={e=>setTc(e.target.value)}>
              {CURR.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, alignItems:'flex-end'}}>
          <div><Lbl t={T.fxAmt}/><input style={{...S.inp, fontSize:16}} type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="100"/></div>
          <div>
            <div style={{fontSize:28, fontWeight:300, color:G.gold}}>{sym(tc)}{result.toFixed(2)}</div>
            <div style={{fontSize:12, color:G.dim}}>{tc.split(' ')[0]}</div>
          </div>
        </div>
        <div style={{marginTop:8, fontSize:13, color:G.dim}}>1 {sym(fc)} = {sym(tc)}{getRate(fc,tc).toFixed(4)}{Object.keys(overrides).length > 0 && <span style={{color:G.gold, marginLeft:6}}>{T.customized}</span>}</div>
      </div>

      {/* Pair editor */}
      <div style={{...S.card, marginBottom:14}}>
        <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.dim, marginBottom:12}}>{T.pairEdit}</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:8, alignItems:'flex-end', marginBottom:10}}>
          <div>
            <Lbl t={T.pairFrom}/>
            <select style={{...S.inp, appearance:'none', fontSize:13}} value={pA} onChange={e=>setPA(e.target.value)}>
              {CURR.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{color:G.dim, fontSize:14, marginBottom:12, textAlign:'center'}}>→</div>
          <div>
            <Lbl t={T.pairTo}/>
            <select style={{...S.inp, appearance:'none', fontSize:13}} value={pB} onChange={e=>setPB(e.target.value)}>
              {CURR.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'flex-end', marginBottom:10}}>
          <div style={{flex:1}}>
            <Lbl t={'1 ' + sym(pA) + ' = ? ' + sym(pB)}/>
            <input style={{...S.inp, fontSize:15}} type="number" placeholder={getRate(pA,pB).toFixed(4)} value={pVal} onChange={e=>setPVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&setPair()}/>
          </div>
          <button style={{...S.gold, padding:'10px 16px', flexShrink:0}} onClick={setPair}>{T.setPair}</button>
        </div>
        <div style={{fontSize:13, color:G.dim, marginBottom:pA!==pB?8:0}}>
          {pA!==pB && T.currentRate + ': 1 ' + sym(pA) + ' = ' + sym(pB) + getRate(pA,pB).toFixed(4)}
        </div>
      </div>

      {/* Rate table — base currency selector */}
      <div style={{marginBottom:10}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
          <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.dim}}>{T.allRates}</div>
          <div style={{display:'flex', gap:6, alignItems:'center'}}>
            {Object.keys(overrides).length > 0 && (
              <button style={{...S.gh, fontSize:11, padding:'5px 9px'}} onClick={resetAll}>{T.resetFx}</button>
            )}
          </div>
        </div>
        <div style={{display:'flex', gap:5, flexWrap:'wrap', marginBottom:12}}>
          {CURR.map(c => (
            <button key={c} onClick={() => setBaseCurr(c)} style={{...CZ, fontSize:12, letterSpacing:1, cursor:'pointer', padding:'5px 11px', borderRadius:2, border:'1px solid '+(baseCurr===c?G.gold:'#3a3020'), background:baseCurr===c?G.gold+'18':'transparent', color:baseCurr===c?G.gold:G.sub}}>
              {sym(c)}
            </button>
          ))}
        </div>
        {CURR.filter(c => c !== baseCurr).map(b => {
          const key = baseCurr+'->'+b;
          const rkey = b+'->'+baseCurr;
          const isCustom = overrides[key] !== undefined || overrides[rkey] !== undefined;
          return (
            <div key={b} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 12px', borderBottom:'1px solid '+G.br2, fontSize:14}}>
              <span style={{color:G.sub}}>1 {sym(baseCurr)}</span>
              <span style={{color:isCustom?G.gold:G.text}}>
                {isCustom && <span style={{fontSize:9, color:G.gold, marginRight:4}}>●</span>}
                {sym(b)}{getRate(baseCurr,b).toFixed(4)}
              </span>
            </div>
          );
        })}
      </div>

      <div style={{padding:'10px 12px', background:'rgba(212,168,83,.04)', border:'1px solid '+G.br, borderRadius:4, fontSize:13, color:G.dim, lineHeight:1.6}}>
        {T.fxNote}
      </div>
    </div>
  );
}

// ── LOCAL STORAGE PERSISTENCE ──
function trySave(key, val) {
  try {
    localStorage.setItem('vg_' + key, JSON.stringify(val));
  } catch(e) {
    try {
      const safe = Array.isArray(val)
        ? val.map(item => item && typeof item === 'object' && 'photos' in item ? {...item, photos:[]} : item)
        : val;
      localStorage.setItem('vg_' + key, JSON.stringify(safe));
      localStorage.setItem('vg_photoWarn', '1');
    } catch(e2) {}
  }
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try {
      const stored = localStorage.getItem('vg_' + key);
      return stored ? JSON.parse(stored) : init;
    } catch(e) { return init; }
  });
  const set = v => { setVal(v); trySave(key, v); };
  const setFn = fn => {
    setVal(prev => {
      const next = fn(prev);
      trySave(key, next);
      return next;
    });
  };
  return [val, (v) => typeof v === 'function' ? setFn(v) : set(v)];
}

const PLAN_COLORS = ['#d4a853','#7a9b6a','#6a7a9b','#9b7a8a','#9b8a6a','#7a8a9b','#c0504d','#8b7a9b'];

function CalendarTab({T, plans, setPlans, commutes, entries, exps}) {

  const [form, setForm]         = useState({name:'', start:'', end:'', color:PLAN_COLORS[0]});

  const [viewMonth, setViewMonth] = useState(new Date().getMonth()); // 0-indexed

    if (!form.name || !form.start) return;
    if (form.end && form.end < form.start) { setDateErr(T.dateErrEnd||'結束日期不能早於開始日期'); return; }
    setDateErr('');
    if (editId) {

    } else {
      setPlans(ps => [{...form, id:Date.now()}, ...ps]);

    setForm({name:'', start:'', end:'', color:PLAN_COLORS[0]});
    setEditId(null); setShowForm(false);
  };

  const openEdit = p => { setForm({name:p.name,start:p.start,end:p.end,color:p.color}); setEditId(p.id); setShowForm(true); };

  // Build calendar grid for viewYear/viewMonth
  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const today = new Date();

  const toISO = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+dd;
  };

  const dateStr = (y,m,d) => y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');

  // Get plans active on a given date
  const plansForDate = ds => plans.filter(p => {
    if (!p.start) return false;
    const end = p.end || p.start;
    return ds >= p.start && ds <= end;
  });

  // Get events on a date
  const eventsForDate = ds => {
    const c = commutes.filter(x => x.date === ds);
    const e = entries.filter(x => x.date === ds);
    const x = exps.filter(ex => ex.date === ds);
    return {commutes:c, entries:e, exps:x};
  };

  const prevMonth = () => { if (viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const nextMonth = () => { if (viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAY_NAMES   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  // Selected date detail

  const [selDate, setSelDate] = useState(null);
  const selEvents = selDate ? eventsForDate(selDate) : null;
  const selPlans  = selDate ? plansForDate(selDate) : [];

  return (
    <div style={{padding:18}}>

      </div>

      {/* Plan strips */}
      {plans.length > 0 && (
        <div style={{marginBottom:14}}>
          {plans.map(p => (
            <div key={p.id} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 12px', marginBottom:6, borderRadius:4, background:p.color+'15', border:'1px solid '+p.color+'44'}}>
              <div style={{width:10, height:10, borderRadius:'50%', background:p.color, flexShrink:0}}/>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:14, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.name}</div>
                <div style={{fontSize:11, color:G.dim}}>{p.start&&p.start.replace(/-/g,'/')}{p.end&&p.end!==p.start?' → '+p.end.replace(/-/g,'/'):''}</div>
              </div>
              <button onClick={() => openEdit(p)} style={{...S.gh, padding:'4px 8px', fontSize:11}}>{T.edit}</button>
              <button onClick={() => setPlans(ps => ps.filter(x=>x.id!==p.id))} style={{...S.rd, padding:'4px 8px', fontSize:11}}>{T.del}</button>
            </div>
          ))}
        </div>
      )}

      {plans.length === 0 && (
        <div style={{textAlign:'center', padding:'16px 0 8px', color:'#3a3020', fontStyle:'italic', fontSize:13, marginBottom:8}}>{T.noPlan}</div>
      )}

      {/* Month navigator */}
      <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:10}}> 
        <button onClick={prevMonth} style={{...S.gh, padding:'6px 12px', fontSize:14, flexShrink:0}}>‹</button>
        {navEditing ? (
          <div style={{flex:1, display:'flex', gap:5}}>
            <input
              autoFocus
              style={{...S.inp, flex:1, fontSize:13, textAlign:'center', padding:'7px 10px'}}
              placeholder="2026/03"
              value={navInput}
              onChange={e => setNavInput(e.target.value)}
              onKeyDown={e => {
                if (e.key==='Enter') {
                  const m = navInput.trim().match(/^(\d{4})\D?(\d{1,2})$/);
                  if (m) { setViewYear(parseInt(m[1])); setViewMonth(parseInt(m[2])-1); }
                  setNavEditing(false);
                }
                if (e.key==='Escape') setNavEditing(false);
              }}
              onBlur={() => setNavEditing(false)}
            />
            <button style={{...S.gold, padding:'7px 12px', fontSize:11}} onMouseDown={e => {
              e.preventDefault();
              const m = navInput.trim().match(/^(\d{4})\D?(\d{1,2})$/);
              if (m) { setViewYear(parseInt(m[1])); setViewMonth(parseInt(m[2])-1); }
              setNavEditing(false);
            }}>Go</button>
          </div>
        ) : (
          <button
            onClick={() => { setNavInput(''); setNavEditing(true); }}
            style={{flex:1, background:'transparent', border:'none', cursor:'pointer', ...CZ, fontSize:13, letterSpacing:3, color:G.gold, padding:'7px 0', textAlign:'center'}}>
            {viewYear} · {MONTH_NAMES[viewMonth]}
          </button>
        )}
        <button onClick={nextMonth} style={{...S.gh, padding:'6px 12px', fontSize:14, flexShrink:0}}>›</button>
        <button
          onClick={() => { setViewYear(new Date().getFullYear()); setViewMonth(new Date().getMonth()); setNavEditing(false); }}
          style={{...S.gh, padding:'5px 8px', fontSize:10, flexShrink:0, color:G.gold, borderColor:'rgba(212,168,83,.3)'}}>
          ⌂
        </button>
      </div>

      {/* Day headers */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:2}}>
        {DAY_NAMES.map(d => (
          <div key={d} style={{textAlign:'center', fontSize:10, color:G.dim, padding:'4px 0', ...CZ}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
        {/* Empty cells before first day */}
        {Array.from({length: firstDay}).map((_,i) => <div key={'e'+i}/>)}

        {Array.from({length: daysInMonth}).map((_,i) => {
          const day = i+1;
          const ds  = dateStr(viewYear, viewMonth, day);
          const dayPlans = plansForDate(ds);
          const ev = eventsForDate(ds);
          const hasData = ev.commutes.length||ev.entries.length||ev.exps.length;
          const isToday = day===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
          const isSel   = ds === selDate;

          return (
            <div key={day} onClick={() => setSelDate(isSel ? null : ds)}
              style={{
                minHeight:44, borderRadius:3, padding:'3px 4px', cursor:'pointer', position:'relative',
                background: isSel ? G.gold+'22' : isToday ? 'rgba(212,168,83,.08)' : G.bg3,
                border:'1px solid '+(isSel?G.gold:isToday?G.gold+'44':G.br2),
              }}>
              <div style={{fontSize:12, color:isToday?G.gold:G.text, fontWeight:isToday?600:400, marginBottom:2}}>{day}</div>
              {/* Plan color dots */}
              <div style={{display:'flex', flexWrap:'wrap', gap:2}}>
                {dayPlans.slice(0,3).map(p => (
                  <div key={p.id} style={{width:6, height:6, borderRadius:'50%', background:p.color}}/>
                ))}
              </div>
              {/* Data indicators */}
              {hasData>0 && (
                <div style={{position:'absolute', bottom:3, right:3, display:'flex', gap:2}}>
                  {ev.entries.length>0&&<span style={{fontSize:8}}>📔</span>}
                  {ev.exps.length>0&&<span style={{fontSize:8}}>💰</span>}
                  {ev.commutes.length>0&&<span style={{fontSize:8}}>🚄</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Selected date detail */}
      {selDate && (
        <div style={{marginTop:14, borderTop:'1px solid '+G.br, paddingTop:14}}>
          <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.gold, marginBottom:10}}>{selDate.replace(/-/g,'/')}</div>

          {selPlans.length > 0 && selPlans.map(p => (
            <div key={p.id} style={{display:'flex', alignItems:'center', gap:6, marginBottom:6}}>
              <div style={{width:8, height:8, borderRadius:'50%', background:p.color}}/>
              <span style={{fontSize:13, color:p.color}}>{p.name}</span>
            </div>
          ))}

          {selEvents.entries.map(e => (
            <div key={e.id} style={{...S.card, padding:'10px 12px', marginBottom:6}}>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <span style={{fontSize:13}}>📔</span>
                <span style={{fontSize:14, fontWeight:500}}>{e.city}</span>
                {'★'.repeat(e.rating) && <span style={{fontSize:11, color:G.gold}}>{'★'.repeat(e.rating)}</span>}
              </div>
              {e.comment && <div style={{fontSize:12, color:G.sub, fontStyle:'italic', marginTop:4}}>"{e.comment}"</div>}
            </div>
          ))}

          {selEvents.exps.map(e => (
            <div key={e.id} style={{...S.card, padding:'10px 12px', marginBottom:6, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <span style={{fontSize:13}}>💰</span>
                <span style={{fontSize:14}}>{e.shop||e.category}</span>
              </div>
              <span style={{fontSize:15, color:G.gold}}>{e.currency&&e.currency.split(' ')[1]}{e.amount}</span>
            </div>
          ))}

          {selEvents.commutes.map(c => (
            <div key={c.id} style={{...S.card, padding:'10px 12px', marginBottom:6}}>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <span style={{fontSize:13}}>🚄</span>
                <span style={{fontSize:14}}>{c.from} → {c.to}</span>
              </div>
              {c.estTime && <div style={{fontSize:12, color:G.dim, marginTop:3}}>{c.estTime}</div>}
            </div>
          ))}

          {!selPlans.length && !selEvents.entries.length && !selEvents.exps.length && !selEvents.commutes.length && (
            <div style={{textAlign:'center', fontSize:13, color:'#3a3020', fontStyle:'italic', padding:'12px 0'}}>{T.noRecords}</div>
          )}
        </div>
      )}

      {/* Plan Form Modal */}
      <Modal show={showForm} onClose={() => {setShowForm(false);setEditId(null);}} title={editId ? T.edit : T.addPlan}>
        <div style={{marginBottom:10}}><Lbl t={T.planName + ' *'}/><input style={S.inp} placeholder="Roma, 波蘭之旅..." value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:dateErr?6:10}}>
          <div>
            <Lbl t={T.planStart + ' *'}/>
            <input type="date" style={{...S.inp, colorScheme:'dark'}} value={form.start}
              onChange={e=>{setForm(p=>({...p,start:e.target.value})); if(form.end&&e.target.value>form.end) setDateErr(T.dateErrEnd||'結束日期不能早於開始日期'); else setDateErr('');}}/>
          </div>
          <div>
            <Lbl t={T.planEnd}/>
            <input type="date" style={{...S.inp, colorScheme:'dark'}} value={form.end}
              onChange={e=>{setForm(p=>({...p,end:e.target.value})); if(e.target.value&&form.start&&e.target.value<form.start) setDateErr(T.dateErrEnd||'結束日期不能早於開始日期'); else setDateErr('');}}/>
          </div>
        </div>
        {dateErr && <div style={{fontSize:12, color:'#c8948a', marginBottom:8}}>⚠ {dateErr}</div>}
        <div style={{marginBottom:16}}>
          <Lbl t={T.planColor}/>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            {PLAN_COLORS.map(c => (
              <button key={c} onClick={() => setForm(p=>({...p,color:c}))}
                style={{width:28, height:28, borderRadius:'50%', background:c, border: form.color===c ? '3px solid #fff' : '3px solid transparent', cursor:'pointer', padding:0}}>
              </button>
            ))}
          </div>
        </div>
        <div style={{display:'flex', gap:10}}>
          <button style={{...S.gh, flex:1}} onClick={() => {setShowForm(false);setEditId(null);}}>{T.cancel}</button>
          <button style={{...S.gold, flex:2, opacity:(!form.name||!form.start)?0.5:1}} onClick={submit}>{T.save}</button>
        </div>
      </Modal>
    </div>
  );
}

// MAIN APP
// ══════════════════════════════════════════════
function App() {
  const [lang, setLang] = useStorage('lang', '繁中');
  const T = TR[lang];
  const [tab, setTab] = useState(0);
  const [defCurr, setDefCurr] = useStorage('defCurr', 'CNY ¥');
  const [tripName, setTripName] = useStorage('tripName', '');
  const [plans, setPlans] = useStorage('plans', []);

  // Transport
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');
  const [searched, setSearched] = useState(false);
  const [commutes, setCommutes] = useStorage('commutes', []);
  const [showST, setShowST] = useState(false);
  const [editCId, setEditCId] = useState(null);
  const [stF, setStF] = useState({date:'', estTime:'', cost:'', currency:'CNY ¥', note:''});

  // Diary
  const [entries, setEntries] = useStorage('entries', []);
  const [showDF, setShowDF] = useState(false);
  const [editDId, setEditDId] = useState(null);
  const [dF, setDF] = useState({city:'', country:'', date:'', rating:5, comment:'', tags:''});
  const [dPh, setDPh] = useState([]);

  // Expenses
  const [exps, setExps] = useStorage('exps', []);
  const [showEF, setShowEF] = useState(false);
  const [editEId, setEditEId] = useState(null);
  const [eF, setEF] = useState({date:'', city:'', shop:'', category:'', amount:'', currency:'CNY ¥', note:''});
  const [ePh, setEPh] = useState([]);

  // Stats
  const [sCurr, setSCurr] = useState(defCurr);
  const [sView, setSView] = useState('monthly');
  const [showCDD, setShowCDD] = useState(false);

  useEffect(() => { setSCurr(defCurr); }, [defCurr]);

  const sym = c => c.split(' ')[1] || '';
  const cv = (e, fx) => {
    const r = fx ? fx[e.currency] / fx[sCurr] : BASE_FX[e.currency] / BASE_FX[sCurr];
    return (parseFloat(e.amount)||0) * r;
  };
  const total = exps.reduce((a,e) => a + cv(e, null), 0);
  const byM = exps.reduce((a,e) => { const m=e.date&&e.date.slice(0,7).replace('-','/')||'?'; a[m]=(a[m]||0)+cv(e,null); return a; }, {});
  const byC = exps.reduce((a,e) => { a[e.city]=(a[e.city]||0)+cv(e,null); return a; }, {});
  // Country stats from diary entries
  const thisYear = new Date().getFullYear().toString();
  const yearEntries = entries.filter(e => e.date && e.date.startsWith(thisYear));
  const allCountries = [...new Set(yearEntries.map(e => e.country).filter(Boolean))];
  const byMCountry = yearEntries.reduce((a,e) => {
    const m = e.date.slice(0,7).replace('-','/');
    if (!a[m]) a[m] = new Set();
    if (e.country) a[m].add(e.country);
    return a;
  }, {});
  const mLCountry = Object.keys(byMCountry).sort();
  const mL = Object.keys(byM).sort();
  const cL = Object.keys(byC).sort((a,b)=>byC[b]-byC[a]);

  const doSearch = () => {
    if (!from.trim() || !to.trim()) return;
    window.open('https://www.google.com/maps/dir/?api=1&origin=' + encodeURIComponent(from) + '&destination=' + encodeURIComponent(to) + '&travelmode=transit', '_blank');
    setSearched(true);
    setStF(f => ({...f, date:new Date().toISOString().slice(0,10)}));
  };

  const saveCommute = () => {
    if (!stF.date) return;
    if (editCId) {
      setCommutes(cs => cs.map(c => c.id===editCId ? {...c, ...stF, cost:parseFloat(stF.cost)||0} : c));
      setEditCId(null);
    } else {
      setCommutes(cs => [{id:Date.now(), ...stF, cost:parseFloat(stF.cost)||0}, ...cs]);
    }
    setShowST(false);
    setStF({date:new Date().toISOString().slice(0,10), estTime:'', cost:'', currency:defCurr, note:'', from:'', to:''});
  };

  const openEditD = e => { setDF({city:e.city, country:e.country, date:e.date, rating:e.rating, comment:e.comment, tags:e.tags}); setDPh(e.photos||[]); setEditDId(e.id); setShowDF(true); };
  const submitD = () => {
    if (!dF.city || !dF.date) return;
    if (editDId) setEntries(es => es.map(e => e.id===editDId ? {...e, ...dF, photos:dPh} : e));
    else setEntries(es => [{id:Date.now(), ...dF, photos:dPh}, ...es]);
    setDF({city:'', country:'', date:new Date().toISOString().slice(0,10), rating:5, comment:'', tags:''}); setDPh([]); setEditDId(null); setShowDF(false);
  };

  const openEditE = e => { setEF({date:e.date, city:e.city, shop:e.shop||'', category:e.category, amount:e.amount, currency:e.currency, note:e.note||''}); setEPh(e.photos||[]); setEditEId(e.id); setShowEF(true); };
  const submitE = () => {
    if (!eF.amount || !eF.date) return;
    const item = {...eF, amount:parseFloat(eF.amount)||0, photos:ePh};
    if (editEId) setExps(es => es.map(e => e.id===editEId ? {...e, ...item} : e));
    else setExps(es => [{id:Date.now(), ...item}, ...es]);
    setEF({date:new Date().toISOString().slice(0,10), city:'', shop:'', category:'', amount:'', currency:defCurr, note:''}); setEPh([]); setEditEId(null); setShowEF(false);
  };

  const ICONS = ['📅','🚄','🗺','📔','💰','📊','⚙'];

  return (
    <div style={{fontFamily:"'Cormorant Garamond','Georgia',serif", background:G.bg, minHeight:'100vh', color:G.text, maxWidth:430, margin:'0 auto'}}>

      {/* HEADER */}
      <div style={{padding:'16px 20px 12px', borderBottom:'1px solid '+G.br}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div style={{...CZ, fontSize:11, letterSpacing:4, color:G.dim}}>VIAGGIO · 行</div>
            <div style={{fontSize:20, fontWeight:300, fontStyle:'italic', letterSpacing:2, marginTop:2}}>
              {tripName || '旅途攻略'}
            </div>
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6}}>
            <div style={{display:'flex', gap:3}}>
              {['繁中','简中','EN','IT'].map(l => (
                <button key={l} onClick={() => setLang(l)} style={l===lang ? {...S.gold, padding:'5px 9px', fontSize:11} : {...S.gh, padding:'4px 8px', fontSize:9}}>{l}</button>
              ))}
            </div>
            <button style={{...S.out, fontSize:11, padding:'5px 11px'}} onClick={() => csvDl(exps.map(e=>({Date:e.date,City:e.city,Shop:e.shop,Cat:e.category,Amt:e.amount,Cur:e.currency,Note:e.note})), 'expenses.csv')}>↓ CSV</button>
          </div>
        </div>
      </div>

      {/* TAB BAR */}
      <div style={{display:'flex', borderBottom:'1px solid '+G.br, background:G.bg, position:'sticky', top:0, zIndex:10}}>
        {ICONS.map((ic,i) => (
          <button key={i} onClick={() => setTab(i)} style={{flex:1, background:'transparent', border:'none', cursor:'pointer', padding:'7px 0', ...CZ, fontSize:11, letterSpacing:0, color:tab===i?G.gold:G.dim, position:'relative'}}>
            <span style={{fontSize:16, display:'block', marginBottom:2}}>{ic}</span>
            {T.tabs[i]}
            {tab===i && <span style={{position:'absolute', bottom:0, left:'15%', right:'15%', height:1, background:G.gold, display:'block'}}/>}
          </button>
        ))}
      </div>

      <div style={{overflowY:'auto', height:'calc(100vh - 132px)', paddingBottom:24}}>

        {tab===0 && <CalendarTab T={T} plans={plans} setPlans={setPlans} commutes={commutes} entries={entries} exps={exps}/>}
        {localStorage.getItem('vg_photoWarn') === '1' && (
          <div style={{background:'rgba(155,106,106,.12)', border:'1px solid rgba(155,106,106,.3)', padding:'8px 14px', fontSize:13, color:'#c8948a', lineHeight:1.6, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span>{T.photoWarn}</span>
            <button onClick={() => { localStorage.removeItem('vg_photoWarn'); window.location.reload(); }} style={{background:'none', border:'none', color:'#c8948a', cursor:'pointer', fontSize:14}}>✕</button>
          </div>
        )}

        {/* TRANSPORT */}
        {tab===1 && (
          <div style={{padding:18}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
              <div style={{fontSize:17, fontStyle:'italic'}}>{T.tripLog}</div>
              <button style={{...S.gold, fontSize:11, padding:'7px 14px'}} onClick={() => {
                setStF({date:new Date().toISOString().slice(0,10), estTime:'', cost:'', currency:defCurr, note:'', from:'', to:''});
                setEditCId(null); setShowST(true);
              }}>{T.addTrip}</button>
            </div>
            {/* Google Maps planner */}
            <div style={{...S.card, marginBottom:14}}>
              <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.dim, marginBottom:10}}>🗺 GOOGLE MAPS</div>
              <div style={{marginBottom:8}}><Lbl t={T.from}/><input style={S.inp} placeholder="Beijing, 北京..." value={from} onChange={e=>setFrom(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/></div>
              <div style={{display:'flex', alignItems:'center', margin:'6px 0'}}>
                <div style={{flex:1, height:1, background:G.br}}/><div style={{margin:'0 12px', color:G.gold, fontSize:16}}>↕</div><div style={{flex:1, height:1, background:G.br}}/>
              </div>
              <div style={{marginBottom:10}}><Lbl t={T.to}/><input style={S.inp} placeholder="Shanghai, Roma..." value={to} onChange={e=>setTo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/></div>
              <button style={{...S.gold, width:'100%', fontSize:11, padding:10, letterSpacing:2}} onClick={doSearch}>🗺 {T.openMaps}</button>
            </div>

            {commutes.length > 0 && (
              <div style={{marginTop:20}}>
                <SecHead t={T.tripLog}/>
                {commutes.map(c => (
                  <div key={c.id} style={{...S.card, display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15, fontWeight:500, marginBottom:3}}>{c.from} → {c.to}</div>
                      <div style={{fontSize:12, color:G.dim, marginBottom:4}}>{c.date&&c.date.replace(/-/g,'/')}</div>
                      <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                        {c.estTime && <div><span style={{fontSize:11, color:G.dim}}>{T.estTime} </span><span style={{fontSize:12}}>{c.estTime}</span></div>}
                        {c.cost>0 && <div><span style={{fontSize:11, color:G.dim}}>{T.cost} </span><span style={{fontSize:12, color:G.gold}}>{c.currency&&c.currency.split(' ')[1]}{c.cost}</span></div>}
                      </div>
                      {c.note && <div style={{fontSize:11, color:G.sub, fontStyle:'italic', marginTop:3}}>{c.note}</div>}
                    </div>
                    <div style={{display:'flex', gap:5, marginLeft:8, flexShrink:0}}>
                      <button onClick={() => { setStF({date:c.date, from:c.from||'', to:c.to||'', estTime:c.estTime||'', cost:c.cost||'', currency:c.currency||defCurr, note:c.note||''}); setEditCId(c.id); setShowST(true); }} style={{...S.gh, padding:'5px 9px', fontSize:11}}>{T.edit}</button>
                      <button onClick={() => setCommutes(cs => cs.filter(x => x.id!==c.id))} style={{...S.rd, padding:'5px 9px', fontSize:11}}>{T.del}</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* GUIDE */}
        {tab===2 && <GuideTab T={T}/>}

        {/* DIARY */}
        {tab===3 && (
          <div style={{padding:18}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
              <div style={{fontSize:17, fontStyle:'italic'}}>{T.diaryTitle}</div>
              <div style={{display:'flex', gap:8}}>
                <button style={{...S.gh, fontSize:11}} onClick={() => csvDl(entries.map(e=>({City:e.city,Country:e.country,Date:e.date,Rating:e.rating,Comment:e.comment,Tags:e.tags})), 'diary.csv')}>↓ CSV</button>
                <button style={S.gold} onClick={() => { setDF({city:'', country:'', date:new Date().toISOString().slice(0,10), rating:5, comment:'', tags:''}); setDPh([]); setEditDId(null); setShowDF(true); }}>{T.addDiary}</button>
              </div>
            </div>
            {entries.map(e => (
              <div key={e.id} style={S.card}>
                {e.photos && e.photos.length > 0 && (
                  <div style={{marginBottom:10}}>
                    {e.photos.length===1
                      ? <img src={e.photos[0].url} alt="" style={{width:'100%', maxHeight:220, objectFit:'cover', borderRadius:3, border:'1px solid '+G.br2, display:'block'}}/>
                      : <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4}}>{e.photos.map((ph,j) => <img key={j} src={ph.url} alt="" style={{width:'100%', height:100, objectFit:'cover', borderRadius:2, border:'1px solid '+G.br2}}/>)}</div>
                    }
                  </div>
                )}
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
                  <div>
                    <div style={{fontSize:16, fontWeight:500}}>{e.city}</div>
                    <div style={{fontSize:12, color:G.dim}}>{e.country} · {e.date&&e.date.replace(/-/g,'/')}</div>
                  </div>
                  <div style={{display:'flex', gap:5, alignItems:'center'}}>
                    <Stars v={e.rating}/>
                    <button onClick={() => openEditD(e)} style={{...S.gh, padding:'5px 9px', fontSize:11}}>{T.edit}</button>
                    <button onClick={() => setEntries(es => es.filter(x => x.id!==e.id))} style={{...S.rd, padding:'5px 9px', fontSize:11}}>{T.del}</button>
                  </div>
                </div>
                {e.comment && <div style={{fontSize:13, color:G.sub, lineHeight:1.7, fontStyle:'italic', marginBottom:8}}>"{e.comment}"</div>}
                {e.tags && <div style={{display:'flex', gap:5, flexWrap:'wrap'}}>{e.tags.split(',').filter(Boolean).map((tg,j) => <span key={j} style={{fontSize:12, padding:'4px 8px', borderRadius:2, background:'rgba(212,168,83,.08)', color:G.gold, border:'1px solid rgba(212,168,83,.2)'}}>{tg.trim()}</span>)}</div>}
              </div>
            ))}
          </div>
        )}

        {/* EXPENSES */}
        {tab===4 && (
          <div style={{padding:18}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
              <div style={{fontSize:17, fontStyle:'italic'}}>{T.expTitle}</div>
              <div style={{display:'flex', gap:8}}>
                <button style={{...S.gh, fontSize:11}} onClick={() => csvDl(exps.map(e=>({Date:e.date,City:e.city,Shop:e.shop,Cat:e.category,Amt:e.amount,Cur:e.currency,Note:e.note})), 'expenses.csv')}>↓ CSV</button>
                <button style={S.gold} onClick={() => { setEF({date:new Date().toISOString().slice(0,10), city:'', shop:'', category:'', amount:'', currency:defCurr, note:''}); setEPh([]); setEditEId(null); setShowEF(true); }}>{T.addExp}</button>
              </div>
            </div>
            {exps.map(e => (
              <div key={e.id} style={S.card}>
                {e.photos && e.photos.length > 0 && (
                  <div style={{display:'flex', gap:4, flexWrap:'wrap', marginBottom:8}}>
                    {e.photos.map((ph,j) => <img key={j} src={ph.url} alt="" style={{width:60, height:60, objectFit:'cover', borderRadius:2, border:'1px solid '+G.br2}}/>)}
                  </div>
                )}
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:4, flexWrap:'wrap'}}>
                      {e.category && <span style={{fontSize:12, padding:'3px 8px', borderRadius:2, background:(EXP_CLR[e.category]||G.dim)+'20', color:EXP_CLR[e.category]||G.sub, border:'1px solid '+(EXP_CLR[e.category]||G.br)+'33'}}>{T.expCatLabels ? T.expCatLabels[EXP_CATS.indexOf(e.category)] : e.category}</span>}
                      {e.shop && <span style={{fontSize:14, fontWeight:500}}>{e.shop}</span>}
                    </div>
                    <div style={{fontSize:12, color:G.dim, marginBottom:3}}>{e.city} · {e.date&&e.date.replace(/-/g,'/')}</div>
                    {e.note && <div style={{fontSize:12, color:G.sub, fontStyle:'italic'}}>{e.note}</div>}
                  </div>
                  <div style={{textAlign:'right', marginLeft:12}}>
                    <div style={{fontSize:20, fontWeight:300, color:G.gold}}>{e.currency&&e.currency.split(' ')[1]}{e.amount}</div>
                    <div style={{fontSize:12, color:G.dim, marginBottom:4}}>{e.currency&&e.currency.split(' ')[0]}</div>
                    <div style={{display:'flex', gap:4}}>
                      <button onClick={() => openEditE(e)} style={{...S.gh, padding:'5px 9px', fontSize:11}}>{T.edit}</button>
                      <button onClick={() => setExps(es => es.filter(x => x.id!==e.id))} style={{...S.rd, padding:'5px 9px', fontSize:11}}>{T.del}</button>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* STATS */}
        {tab===5 && (
          <div style={{padding:18}}>
            <div style={{background:G.bg4, border:'1px solid '+G.br, borderRadius:6, padding:14, marginBottom:14}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                <div style={{...CZ, fontSize:11, letterSpacing:2, color:G.dim}}>{T.yearTotal}</div>
                <div style={{position:'relative'}}>
                  <button onClick={() => setShowCDD(v=>!v)} style={{...S.gh, fontSize:12, padding:'6px 10px', display:'flex', alignItems:'center', gap:4}}>
                    {sCurr}<span style={{color:G.gold}}>▾</span>
                  </button>
                  {showCDD && (
                    <div style={{position:'absolute', right:0, top:'100%', background:G.bg2, border:'1px solid '+G.br, borderRadius:2, zIndex:50, minWidth:110}}>
                      {CURR.map(c => (
                        <div key={c} style={{padding:'7px 12px', cursor:'pointer', fontSize:13, color:c===sCurr?G.gold:G.sub}} onMouseEnter={e=>e.currentTarget.style.background=G.bg3} onMouseLeave={e=>e.currentTarget.style.background='transparent'} onClick={() => {setSCurr(c); setShowCDD(false);}}>
                          {c}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              <div style={{fontSize:36, fontWeight:300}}>
                <span style={{fontSize:22, color:G.gold}}>{sym(sCurr)}</span>{total.toFixed(0)}
                <span style={{fontSize:12, color:G.dim, marginLeft:8}}>{sCurr.split(' ')[0]}</span>
              </div>
            </div>

            <div style={{display:'flex', gap:5, marginBottom:16, flexWrap:'wrap'}}>
              {[['monthly',T.monthly],['city',T.byCity],['countries',T.countries],['fx',T.fx],['commute',T.commute]].map(([v,l]) => (
                <button key={v} style={chip(sView===v)} onClick={() => setSView(v)}>{l}</button>
              ))}
            </div>

            {sView==='monthly' && (
              <div>
                <SecHead t={T.monthly}/>
                <Bar labels={mL} vals={mL.map(m=>byM[m])} clr={G.gold} unit={sym(sCurr)} noData={T.noData}/>
                <div style={{marginTop:12}}>{mL.map(m => (
                  <div key={m} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid '+G.br2, fontSize:13}}>
                    <span style={{color:G.sub}}>{m}</span><span style={{color:G.gold}}>{sym(sCurr)}{byM[m].toFixed(0)}</span>
                  </div>
                ))}</div>
              </div>
            )}
            {sView==='city' && (
              <div>
                <SecHead t={T.byCity}/>
                <Bar labels={cL} vals={cL.map(c=>byC[c])} clr={G.green} unit={sym(sCurr)} noData={T.noData}/>
                <div style={{marginTop:12}}>{cL.map(c => (
                  <div key={c} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid '+G.br2, fontSize:13}}>
                    <span style={{color:G.sub}}>{c}</span><span style={{color:G.green}}>{sym(sCurr)}{byC[c].toFixed(0)}</span>
                  </div>
                ))}</div>
              </div>
            )}
            {sView==='countries' && (
              <div>
                <SecHead t={T.countries}/>
                {/* Hero number */}
                <div style={{background:G.bg4, border:'1px solid '+G.br, borderRadius:6, padding:'16px 18px', marginBottom:14, display:'flex', alignItems:'center', gap:16}}>
                  <div style={{fontSize:48, fontWeight:300, color:G.gold, lineHeight:1}}>{allCountries.length}</div>
                  <div>
                    <div style={{...CZ, fontSize:10, letterSpacing:2, color:G.dim}}>{T.countriesTotal}</div>
                    {T.countriesUnit && <div style={{fontSize:12, color:G.sub, marginTop:2}}>{T.countriesUnit}</div>}
                  </div>
                </div>
                {/* Country flags/list */}
                {allCountries.length > 0 && (
                  <div style={{marginBottom:14}}>
                    <SecHead t={T.countriesList}/>
                    <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                      {allCountries.map(c => (
                        <span key={c} style={{fontSize:12, padding:'5px 12px', borderRadius:3, background:'rgba(122,155,106,.12)', color:G.green, border:'1px solid rgba(122,155,106,.25)'}}>{c}</span>
                      ))}
                    </div>
                  </div>
                )}
                {/* Monthly breakdown */}
                <SecHead t={T.monthlyCountries}/>
                <Bar labels={mLCountry} vals={mLCountry.map(m=>byMCountry[m].size)} clr={'#7a9b6a'} noData={T.noData}/>
                <div style={{marginTop:12}}>{mLCountry.map(m => (
                  <div key={m} style={{padding:'8px 0', borderBottom:'1px solid '+G.br2}}>
                    <div style={{display:'flex', justifyContent:'space-between', fontSize:13, marginBottom:4}}>
                      <span style={{color:G.sub}}>{m}</span>
                      <span style={{color:G.green}}>{byMCountry[m].size} {T.countriesUnit||T.countries}</span>
                    </div>
                    <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                      {[...byMCountry[m]].map(c => (
                        <span key={c} style={{fontSize:11, padding:'2px 7px', borderRadius:2, background:'rgba(122,155,106,.1)', color:G.green}}>{c}</span>
                      ))}
                    </div>
                  </div>
                ))}</div>
                {allCountries.length===0 && <div style={{textAlign:'center', padding:'24px 0', color:'#3a3020', fontStyle:'italic', fontSize:13}}>{T.noData}</div>}
              </div>
            )}
            {sView==='fx' && <FXPanel T={T}/>}
            {sView==='commute' && (
              <div>
                <SecHead t={T.commute}/>
                {commutes.length===0 && <div style={{textAlign:'center', padding:'28px 0', color:'#3a3020', fontStyle:'italic', fontSize:13}}>{T.noRecords}</div>}
                {commutes.map(c => (
                  <div key={c.id} style={S.card}>
                    <div style={{fontSize:15, fontWeight:500, marginBottom:3}}>{c.from} → {c.to}</div>
                    <div style={{fontSize:12, color:G.dim, marginBottom:5}}>{c.date&&c.date.replace(/-/g,'/')}</div>
                    <div style={{display:'flex', gap:14, flexWrap:'wrap'}}>
                      {c.estTime && <div><span style={{fontSize:11, color:G.dim}}>{T.estTime} </span><span style={{fontSize:13, color:G.gold}}>{c.estTime}</span></div>}
                      {c.cost>0 && <div><span style={{fontSize:11, color:G.dim}}>{T.cost} </span><span style={{fontSize:13, color:G.green}}>{c.currency&&c.currency.split(' ')[1]}{c.cost}</span></div>}
                    </div>
                    {c.note && <div style={{fontSize:11, color:G.sub, fontStyle:'italic', marginTop:4}}>{c.note}</div>}
                    <div style={{display:'flex', gap:6, marginTop:8}}>
                      <button onClick={() => {
                        setStF({date:c.date, from:c.from||'', to:c.to||'', estTime:c.estTime||'', cost:c.cost||'', currency:c.currency||defCurr, note:c.note||''});
                        setEditCId(c.id);
                        setShowST(true);
                        setTab(1);
                      }} style={{...S.gh, padding:'5px 9px', fontSize:11}}>{T.edit}</button>
                      <button onClick={() => setCommutes(cs => cs.filter(x => x.id!==c.id))} style={{...S.rd, padding:'5px 9px', fontSize:11}}>{T.del}</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SETTINGS */}
        {tab===6 && <SettingsTab T={T} lang={lang} setLang={setLang} defCurr={defCurr} setDefCurr={setDefCurr} tripName={tripName} setTripName={setTripName} entries={entries} exps={exps} commutes={commutes} plans={plans}/>}

      </div>

      {/* MODALS */}
      <Modal show={showST} onClose={() => setShowST(false)} title={editCId ? T.editTrip : T.saveLog}>
        <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:6, alignItems:'flex-end', marginBottom:10}}>
          <div><Lbl t={T.tripFrom + ' *'}/><input style={{...S.inp, borderColor:stF.from?G.br:'rgba(212,168,83,.4)'}} placeholder="北京, Roma..." value={stF.from||''} onChange={e=>setStF(f=>({...f,from:e.target.value}))}/></div>
          <div style={{color:G.gold, fontSize:16, marginBottom:10, textAlign:'center'}}>→</div>
          <div><Lbl t={T.tripTo + ' *'}/><input style={{...S.inp, borderColor:stF.to?G.br:'rgba(212,168,83,.4)'}} placeholder="上海, Paris..." value={stF.to||''} onChange={e=>setStF(f=>({...f,to:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:10}}><Lbl t={T.date + ' *'}/><input type="date" style={{...S.inp, colorScheme:'dark'}} value={stF.date} onChange={e=>setStF(f=>({...f,date:e.target.value}))}/></div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
          <div><Lbl t={T.estTime}/><input style={S.inp} placeholder={T.estTimePH} value={stF.estTime||''} onChange={e=>setStF(f=>({...f,estTime:e.target.value}))}/></div>
          <div><Lbl t={T.cost + ' *'}/><input style={{...S.inp, borderColor:stF.cost?G.br:'rgba(212,168,83,.4)'}} placeholder="0" value={stF.cost} onChange={e=>setStF(f=>({...f,cost:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:10}}><Lbl t={T.currency2 + ' *'}/><select style={{...S.inp, appearance:'none'}} value={stF.currency} onChange={e=>setStF(f=>({...f,currency:e.target.value}))}>{CURR.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
        <div style={{marginBottom:10}}><Lbl t={T.note}/><input style={S.inp} placeholder={T.notePlaceholder} value={stF.note} onChange={e=>setStF(f=>({...f,note:e.target.value}))}/></div>
        {stF.from && stF.to && (
          <button style={{...S.gh, width:'100%', fontSize:11, marginBottom:10}} onClick={() => window.open('https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(stF.from)+'&destination='+encodeURIComponent(stF.to)+'&travelmode=transit','_blank')}>
            🗺 {T.openMaps}
          </button>
        )}
        <div style={{display:'flex', gap:10}}>
          <button style={{...S.gh, flex:1}} onClick={() => setShowST(false)}>{T.cancel}</button>
          <button style={{...S.gold, flex:2, opacity:(!stF.from||!stF.to||!stF.date||!stF.cost)?0.5:1}} onClick={saveCommute}>{T.save}</button>
        </div>
      </Modal>

      <Modal show={showDF} onClose={() => {setShowDF(false); setEditDId(null);}} title={editDId ? T.editDiary : T.addDiary}>
        <Photos photos={dPh} set={setDPh} T={T}/>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
          <div><Lbl t={T.city + ' *'}/><input style={{...S.inp, borderColor: dF.city?G.br:'rgba(212,168,83,.4)'}} placeholder="北京, Roma..." value={dF.city} onChange={e=>setDF(p=>({...p,city:e.target.value}))}/></div>
          <div><Lbl t={T.country}/><input style={S.inp} placeholder="中国, Italia..." value={dF.country} onChange={e=>setDF(p=>({...p,country:e.target.value}))}/></div>
        </div>
        {editCId && (
          <div style={{marginBottom:12, fontSize:13, color:G.sub}}>
            {commutes.find(c=>c.id===editCId)?.from} → {commutes.find(c=>c.id===editCId)?.to}
          </div>
        )}
        <div style={{marginBottom:10}}><Lbl t={T.date + ' *'}/><input type="date" style={{...S.inp, colorScheme:'dark', borderColor: dF.date?G.br:'rgba(212,168,83,.4)'}} value={dF.date} onChange={e=>setDF(p=>({...p,date:e.target.value}))}/></div>
        <div style={{marginBottom:10}}><Lbl t={T.rating}/><Stars v={dF.rating} on={v=>setDF(p=>({...p,rating:v}))} labels={T.starLabels}/></div>
        <div style={{marginBottom:10}}><Lbl t={T.comment}/><textarea style={{...S.ta, minHeight:80}} value={dF.comment} onChange={e=>setDF(p=>({...p,comment:e.target.value}))} placeholder="你的旅行心得..."/></div>
        <div style={{marginBottom:14}}><Lbl t={T.tags}/><input style={S.inp} value={dF.tags} onChange={e=>setDF(p=>({...p,tags:e.target.value}))} placeholder="美食,打卡,必去"/></div>
        <div style={{display:'flex', gap:10}}>
          <button style={{...S.gh, flex:1}} onClick={() => {setShowDF(false); setEditDId(null);}}>{T.cancel}</button>
          <button style={{...S.gold, flex:2, opacity:(!dF.city||!dF.date)?0.5:1}} onClick={submitD}>{T.save}</button>
        </div>
      </Modal>

      <Modal show={showEF} onClose={() => {setShowEF(false); setEditEId(null);}} title={editEId ? T.editExp : T.addExp}>
        <Photos photos={ePh} set={setEPh} T={T}/>
        <div style={{marginBottom:10}}><Lbl t={T.date + ' *'}/><input type="date" style={{...S.inp, colorScheme:'dark', borderColor: eF.date?G.br:'rgba(212,168,83,.4)'}} value={eF.date} onChange={e=>setEF(p=>({...p,date:e.target.value}))}/></div>
        <div style={{marginBottom:10}}><Lbl t={T.city}/><input style={S.inp} placeholder="Roma, 北京..." value={eF.city} onChange={e=>setEF(p=>({...p,city:e.target.value}))}/></div>
        <div style={{marginBottom:10}}><Lbl t={T.shop}/><input style={S.inp} placeholder="餐廳名、景點、飯店..." value={eF.shop} onChange={e=>setEF(p=>({...p,shop:e.target.value}))}/></div>
        <div style={{marginBottom:10}}>
          <Lbl t={T.category}/>
          <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
            {EXP_CATS.map((c,i) => <button key={c} onClick={() => setEF(p=>({...p,category:c}))} style={chip(eF.category===c, EXP_CLR[c])}>{T.expCatLabels ? T.expCatLabels[i] : c}</button>)}
          </div>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
          <div><Lbl t={T.amount + ' *'}/><input style={{...S.inp, borderColor: eF.amount?G.br:'rgba(212,168,83,.4)'}} type="number" placeholder="0.00" value={eF.amount} onChange={e=>setEF(p=>({...p,amount:e.target.value}))}/></div>
          <div><Lbl t={T.currency2 + ' *'}/><input style={{...S.inp, borderColor:eF.currency?G.br:'rgba(212,168,83,.4)'}} placeholder="CNY ¥" value={eF.currency} onChange={e=>setEF(p=>({...p,currency:e.target.value}))}/></div>
        </div>
        <div style={{marginBottom:14}}><Lbl t={T.note}/><input style={S.inp} placeholder="備注（選填）" value={eF.note} onChange={e=>setEF(p=>({...p,note:e.target.value}))}/></div>
        <div style={{display:'flex', gap:10}}>
          <button style={{...S.gh, flex:1}} onClick={() => {setShowEF(false); setEditEId(null);}}>{T.cancel}</button>
          <button style={{...S.gold, flex:2, opacity:(!eF.amount||!eF.date||!eF.currency)?0.5:1}} onClick={submitE}>{T.save}</button>
        </div>
      </Modal>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
